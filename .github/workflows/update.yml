name: Update Backstage data

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:17 UTC (08:17 CEST) — odd minute avoids the top-of-the-hour stampede.
    - cron: "17 6 * * *"

permissions:
  contents: write

# A manual run must never race a scheduled run's push.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Clone backstage/versions
        run: git clone --depth 1 https://github.com/backstage/versions.git "$RUNNER_TEMP/backstage-versions"

      # Blob-less sparse clone: the monorepo is huge, but only packages/ and
      # plugins/ are needed; later tag fetches inherit the blob filter, so a
      # tag costs trees only and git show lazily pulls individual files.
      - name: Clone backstage/backstage
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/backstage/backstage.git "$RUNNER_TEMP/backstage"
          git -C "$RUNNER_TEMP/backstage" sparse-checkout set packages plugins

      - name: Generate release data
        run: npm run update
        env:
          VERSIONS_DIR: ${{ runner.temp }}/backstage-versions
          BACKSTAGE_DIR: ${{ runner.temp }}/backstage

      - name: Commit and push changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update Backstage data"
            git push origin HEAD:main
          fi
